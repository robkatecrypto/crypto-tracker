<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Investment Tracker</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-950 text-slate-100 min-h-screen">

    <div id="auth-screen" class="flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-xl">
            <h2 class="text-2xl font-bold text-center text-emerald-400 mb-2">Crypto Asset Monitor</h2>
            <p class="text-xs text-gray-400 text-center mb-6">Shared dashboard account access portal.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Email Address</label>
                    <input type="email" id="email" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Password</label>
                    <input type="password" id="password" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white outline-none focus:border-emerald-500">
                </div>
                <div class="flex gap-4 pt-2">
                    <button id="btn-login" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold py-2 rounded cursor-pointer transition">Log In</button>
                    <button id="btn-signup" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-2 rounded cursor-pointer transition border border-gray-700">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden max-w-4xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-gray-800">
            <div>
                <h1 class="text-xl font-bold text-emerald-400">Shared Asset Workspace</h1>
                <p id="user-display" class="text-xs text-gray-400"></p>
            </div>
            <button id="btn-logout" class="bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded text-sm font-semibold cursor-pointer">Sign Out</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="md:col-span-1 bg-gray-900 border border-gray-800 p-5 rounded-xl h-fit">
                <h3 class="text-sm font-bold text-gray-300 uppercase mb-4 tracking-wider">Set Your Investment</h3>
               <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Coin API ID (e.g., bitcoin)</label>
                        <input type="text" id="inv-coin" placeholder="bitcoin" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm text-white outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Total Amount Owned</label>
                        <input type="text" id="inv-amount" placeholder="1.8" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm text-white outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Initial USD Cost</label>
                        <input type="text" id="inv-cost" placeholder="180000" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm text-white outline-none focus:border-emerald-500">
                    </div>
                    <button type="button" id="btn-save-asset" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold py-2 rounded text-sm cursor-pointer transition shadow-md">
                        Save / Overwrite Asset
                    </button>
                </div>
            </div>
            <div class="md:col-span-2 bg-gray-900 border border-gray-800 rounded-xl p-6 flex flex-col justify-between">
                <div class="flex justify-between items-start">
                    <div>
                        <span id="asset-name" class="text-xs font-bold uppercase tracking-widest bg-gray-800 px-2.5 py-1 rounded-md text-emerald-400">NO ASSET SET</span>
                        <h2 id="asset-value" class="text-4xl font-black mt-3">$0.00</h2>
                        <p class="text-xs text-gray-400 mt-1">Current Live Valuation</p>
                    </div>
                    <div class="text-right">
                        <span id="daily-badge" class="inline-block text-xs font-bold px-2 py-1 rounded bg-gray-800 text-gray-400">0.00% Today</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-gray-800/60">
                    <div>
                        <p class="text-gray-400 text-xs">Starting Principal</p>
                        <p id="output-cost" class="text-lg font-bold text-white">$0.00</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs">Total return ROI</p>
                        <p id="output-profit" class="text-lg font-bold text-white">$0.00 (0%)</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Uyjnl4PT9p0ZVXH8A-ymPA_COswR2yI";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                document.getElementById('user-display').textContent = `User: ${session.user.email}`;
                loadInvestmentData();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('dashboard-screen').classList.add('hidden');
            }
        });

        document.getElementById('btn-signup').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Account created successfully!");
        });

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        });

        document.getElementById('btn-logout').addEventListener('click', () => supabase.auth.signOut());

        // Direct click tracker that completely blocks the question mark refresh behavior
        document.getElementById('btn-save-asset').addEventListener('click', async () => {
            const coin_id = document.getElementById('inv-coin').value.trim().toLowerCase();
            const amount = parseFloat(document.getElementById('inv-amount').value);
            const initial_usd_cost = parseFloat(document.getElementById('inv-cost').value);

            if (!coin_id || isNaN(amount) || isNaN(initial_usd_cost)) {
                return alert("Please enter valid parameters.");
            }

            const { error } = await supabase.from('user_investments').upsert({
                profile_id: "shared_dashboard", coin_id, amount, initial_usd_cost, updated_at: new Date()
            });

            if (error) alert("Database Error: " + error.message);
            else { alert("Investment Saved Successfully!"); loadInvestmentData(); }
        });

        async function loadInvestmentData() {
            try {
                const { data: invs, error } = await supabase.from('user_investments').select('*').eq('profile_id', 'shared_dashboard');
                if (error || !invs || invs.length === 0) return;
                const activeAsset = invs[0];

                let tickerSymbol = "BTCUSDT";
                if (activeAsset.coin_id === "ethereum") tickerSymbol = "ETHUSDT";
                if (activeAsset.coin_id === "solana") tickerSymbol = "SOLUSDT";

                const res = await fetch(`https://binance.com{tickerSymbol}`);
                const marketData = await res.json();
                const currentPrice = parseFloat(marketData.lastPrice);
                const dailyChangePercent = parseFloat(marketData.priceChangePercent) || 0;

                const liveValue = activeAsset.amount * currentPrice;
                const profitLoss = liveValue - activeAsset.initial_usd_cost;
                const roiPercentage = activeAsset.initial_usd_cost > 0 ? (profitLoss / activeAsset.initial_usd_cost) * 100 : 0;

                document.getElementById('asset-name').textContent = activeAsset.coin_id;
                document.getElementById('asset-value').textContent = `$${liveValue.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                document.getElementById('output-cost').textContent = `$${parseFloat(activeAsset.initial_usd_cost).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                
                const profitEl = document.getElementById('output-profit');
                profitEl.textContent = `${profitLoss >= 0 ? '+' : ''}$${profitLoss.toLocaleString(undefined, {minimumFractionDigits: 2})} (${roiPercentage.toFixed(2)}%)`;
                profitEl.className = `text-lg font-bold ${profitLoss >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;

                const dailyBadge = document.getElementById('daily-badge');
                dailyBadge.textContent = `${dailyChangePercent >= 0 ? '+' : ''}${dailyChangePercent.toFixed(2)}% Today`;
                dailyBadge.className = `inline-block text-xs font-bold px-2 py-1 rounded ${dailyChangePercent >= 0 ? 'bg-emerald-950 text-emerald-400' : 'bg-rose-950 text-rose-400'}`;
            } catch (err) { console.error(err); }
        }
        setInterval(loadInvestmentData, 60000);
    </script>
</body>
</html>
