<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Investment Tracker</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    body {
      background-color: #0b0f19;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .box {
      background-color: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 25px;
      width: 100%;
      max-width: 450px;
    }

    .header-title {
      font-size: 22px;
      font-weight: bold;
      color: #10b981;
      text-align: center;
      margin-bottom: 5px;
    }

    .sub-text {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 20px;
    }

    .field-group {
      margin-bottom: 15px;
    }

    .field-group label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .field-group input {
      width: 100%;
      background-color: #1f2937;
      border: 1px solid #374151;
      padding: 12px;
      border-radius: 6px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
    }

    .field-group input:focus {
      border-color: #10b981;
    }

    .btn-action {
      width: 100%;
      background-color: #10b981;
      color: #030712;
      font-weight: bold;
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      margin-top: 5px;
    }

    .flex-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .flex-row button {
      flex: 1;
      padding: 12px;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn-go {
      background-color: #10b981;
      color: #030712;
    }

    .btn-create {
      background-color: #1f2937;
      color: #f8fafc;
      border: 1px solid #374151;
    }

    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #374151;
    }

    .metric-card {
      background-color: #030712;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .metric-value {
      font-size: 26px;
      font-weight: 800;
      color: #ffffff;
      margin-top: 3px;
    }

    .trend-tag {
      display: inline-block;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      margin-top: 5px;
    }

    .trend-up {
      background-color: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }

    .trend-down {
      background-color: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .trend-neutral {
      background-color: #374151;
      color: #94a3b8;
    }

    .hidden {
      display: none !important;
    }

    .error-text {
      margin-top: 12px;
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    .success-text {
      margin-top: 12px;
      color: #10b981;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div id="auth-screen" class="box">
    <h2 class="header-title">Crypto Monitor</h2>
    <p class="sub-text">Create up to 2 unique logins. Accounts share the same data view.</p>

    <div class="field-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="name@example.com" />
    </div>

    <div class="field-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <div class="flex-row">
      <button id="btn-login" class="btn-go">Log In</button>
      <button id="btn-signup" class="btn-create">Sign Up</button>
    </div>

    <p id="auth-message" class="error-text"></p>
  </div>

  <div id="dashboard-screen" class="box hidden">
    <div class="dash-header">
      <div>
        <h3 style="font-size: 15px; font-weight: bold; color: #10b981;">Asset Workspace</h3>
        <p id="user-display" style="font-size: 11px; color: #94a3b8; margin-top: 2px;"></p>
      </div>

      <button
        id="btn-logout"
        style="background-color: #1f2937; color: #f8fafc; border: 1px solid #374151; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer;"
      >
        Sign Out
      </button>
    </div>

    <div class="metric-card">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
          <span id="asset-name" class="trend-tag trend-neutral">NO ASSET MONITORING</span>
          <div id="asset-value" class="metric-value">$0.00</div>
          <p style="font-size: 11px; color: #94a3b8; margin-top: 2px;">Current Valuation</p>
        </div>

        <div style="text-align: right;">
          <div id="daily-badge" class="trend-tag trend-neutral">0.00% Today</div>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; margin-top: 15px; padding-top: 12px; border-top: 1px solid #1f2937;">
        <div>
          <p style="font-size: 11px; color: #94a3b8;">Initial Principal</p>
          <p id="output-cost" style="font-size: 15px; font-weight: bold; color: #ffffff;">$0.00</p>
        </div>

        <div style="text-align: right;">
          <p style="font-size: 11px; color: #94a3b8;">Total Growth ROI</p>
          <p id="output-profit" style="font-size: 15px; font-weight: bold; color: #ffffff;">$0.00 (0%)</p>
        </div>
      </div>
    </div>

    <div>
      <div class="field-group">
        <label>Coin Name ID</label>
        <input type="text" id="inv-coin" placeholder="bitcoin, ethereum, solana" />
      </div>

      <div class="field-group">
        <label>Total Token Volume</label>
        <input type="text" id="inv-amount" placeholder="1.8" />
      </div>

      <div class="field-group">
        <label>Initial Capital Injected (USD)</label>
        <input type="text" id="inv-cost" placeholder="180000" />
      </div>

      <button id="btn-save-asset" class="btn-action">Save / Overwrite Asset</button>
      <p id="save-message" class="success-text"></p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://zpdmornrnntxjfgzqxel.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Uyjnl4PT9p0ZVXH8A-ymPA_COswR2yI";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const authScreen = document.getElementById("auth-screen");
    const dashboardScreen = document.getElementById("dashboard-screen");
    const userDisplay = document.getElementById("user-display");
    const authMessage = document.getElementById("auth-message");
    const saveMessage = document.getElementById("save-message");

    function showAuthMessage(message, isSuccess = false) {
      authMessage.textContent = message;
      authMessage.className = isSuccess ? "success-text" : "error-text";
    }

    function showSaveMessage(message, isError = false) {
      saveMessage.textContent = message;
      saveMessage.className = isError ? "error-text" : "success-text";
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session) {
        authScreen.classList.add("hidden");
        dashboardScreen.classList.remove("hidden");
        userDisplay.textContent = `User: ${session.user.email}`;
        loadInvestmentData();
      } else {
        authScreen.classList.remove("hidden");
        dashboardScreen.classList.add("hidden");
      }
    });

    document.getElementById("btn-signup").addEventListener("click", async () => {
      showAuthMessage("");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showAuthMessage("Please enter an email and password.");
        return;
      }

      const { error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        showAuthMessage(error.message);
      } else {
        showAuthMessage("Account created. Check your email if confirmation is turned on.", true);
      }
    });

    document.getElementById("btn-login").addEventListener("click", async () => {
      showAuthMessage("");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showAuthMessage("Please enter an email and password.");
        return;
      }

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showAuthMessage(error.message);
      }
    });

    document.getElementById("btn-logout").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
    });

    document.getElementById("btn-save-asset").addEventListener("click", async () => {
      showSaveMessage("");

      const coin_id = document.getElementById("inv-coin").value.trim().toLowerCase();
      const amount = Number(document.getElementById("inv-amount").value);
      const initial_usd_cost = Number(document.getElementById("inv-cost").value);

      if (!coin_id || !amount || !initial_usd_cost) {
        showSaveMessage("Please enter a coin name, token amount, and initial cost.", true);
        return;
      }

      const { error } = await supabaseClient
        .from("user_investments")
        .upsert(
          {
            profile_id: "shared_dashboard",
            coin_id: coin_id,
            amount: amount,
            initial_usd_cost: initial_usd_cost,
            updated_at: new Date().toISOString()
          },
          {
            onConflict: "profile_id"
          }
        );

      if (error) {
        showSaveMessage("Database Error: " + error.message, true);
      } else {
        showSaveMessage("Investment saved successfully.");
        loadInvestmentData();
      }
    });

    async function loadInvestmentData() {
      try {
        const { data, error } = await supabaseClient
          .from("user_investments")
          .select("*")
          .eq("profile_id", "shared_dashboard")
          .maybeSingle();

        if (error) {
          console.error("Supabase load error:", error.message);
          return;
        }

        if (!data) {
          return;
        }

        const activeAsset = data;

        document.getElementById("inv-coin").value = activeAsset.coin_id || "";
        document.getElementById("inv-amount").value = activeAsset.amount || "";
        document.getElementById("inv-cost").value = activeAsset.initial_usd_cost || "";

        const priceUrl =
          `https://api.coingecko.com/api/v3/simple/price?ids=${encodeURIComponent(activeAsset.coin_id)}&vs_currencies=usd&include_24hr_change=true`;

        const response = await fetch(priceUrl);

        if (!response.ok) {
          throw new Error("Could not fetch crypto price.");
        }

        const marketData = await response.json();
        const coinData = marketData[activeAsset.coin_id];

        if (!coinData) {
          showSaveMessage("Coin not found. Try bitcoin, ethereum, or solana.", true);
          return;
        }

        const currentPrice = Number(coinData.usd) || 0;
        const dailyChangePercent = Number(coinData.usd_24h_change) || 0;

        const liveValue = Number(activeAsset.amount) * currentPrice;
        const profitLoss = liveValue - Number(activeAsset.initial_usd_cost);

        const roiPercentage =
          Number(activeAsset.initial_usd_cost) > 0
            ? (profitLoss / Number(activeAsset.initial_usd_cost)) * 100
            : 0;

        document.getElementById("asset-name").textContent =
          activeAsset.coin_id.toUpperCase();

        document.getElementById("asset-name").className = "trend-tag trend-neutral";

        document.getElementById("asset-value").textContent =
          "$" + liveValue.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
          });

        document.getElementById("output-cost").textContent =
          "$" + Number(activeAsset.initial_usd_cost).toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
          });

        const profitEl = document.getElementById("output-profit");

        profitEl.textContent =
          (profitLoss >= 0 ? "+" : "") +
          "$" +
          profitLoss.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
          }) +
          " (" +
          roiPercentage.toFixed(2) +
          "%)";

        profitEl.style.color = profitLoss >= 0 ? "#10b981" : "#ef4444";

        const dailyBadge = document.getElementById("daily-badge");

        dailyBadge.textContent =
          (dailyChangePercent >= 0 ? "+" : "") +
          dailyChangePercent.toFixed(2) +
          "% Today";

        dailyBadge.className =
          "trend-tag " + (dailyChangePercent >= 0 ? "trend-up" : "trend-down");

      } catch (err) {
        console.error("Load investment error:", err);
        showSaveMessage("Could not load live crypto price right now.", true);
      }
    }

    setInterval(loadInvestmentData, 60000);
  </script>
</body>
</html>
